<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>In Every Life</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div id="life-label"></div>
  <div id="title">I will love you in every life</div>

  <div id="stage">
    <div id="char-left" class="character" draggable="false"></div>
    <div id="char-right" class="character" draggable="false"></div>
  </div>

  <div id="hearts-container"></div>

  <div id="letter-overlay" class="hidden">
    <div id="envelope">
      <!-- Sealed envelope -->
      <div id="envelope-front">
        <div id="envelope-body">
          <div id="envelope-flap"></div>
          <div id="wax-seal">
            <span id="seal-heart">&#10084;</span>
          </div>
        </div>
        <p id="envelope-label">A letter for you</p>
        <button id="open-btn">Open</button>
      </div>

      <!-- Letter (shown after open) -->
      <div id="letter-content" class="hidden">
        <div id="letter-paper">
          <div id="letter-fold-top"></div>
          <div id="letter-inner">
            <div id="letter-ornament-top">&#10053;</div>
            <p id="letter-text"></p>
            <div id="letter-ornament-bottom">&#10053;</div>
          </div>
          <div id="letter-fold-bottom"></div>
        </div>
        <button id="next-life-btn">Next Life &rarr;</button>
      </div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
